name: Deploy UI Mockup to GitHub Pages

on:
  push:
    branches:
      - main
      # Feature branch kept so preview deploys during development; remove after merging to main.
      - copilot/build-windows-desktop-utility
    paths:
      - 'ui-mockup-tester/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress so a push mid-deploy completes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './ui-mockup-tester'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
